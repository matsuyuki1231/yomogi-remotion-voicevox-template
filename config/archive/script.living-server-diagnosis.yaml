# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / タイプ診断型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「タイプ診断型」心理テスト風フェイクアウト・ショート
#   TikTok/YouTubeで強い「診断系（あなたは何タイプ？）」コンテンツに擬態する設計。
#   前半は宣伝色ゼロの「マイクラタイプ診断」3問で視聴者を巻き込み（心の中で回答させる）、
#   結果発表4連発（職人/まったり/商人/社長）→ めたんの「その遊び、どこでできるの？」を
#   きっかけに「4タイプ全員の楽園＝よもぎ生活サーバー」をリビール。
#   無料→検索CTA→「あなたは何タイプだった？コメントで教えて」で
#   診断系最大の武器＝結果シェアのコメント誘発で締める。
#
# ■ 新フィールド（DiagnosisOverlay 用）:
#   diagBadge     : 上部のグラデーションピルバッジ（"マイクラタイプ診断"/"Q1"/"結果発表"）
#   diagQ         : 白カードの設問・見出し
#   diagA / diagB : 選択肢カード（正解リビールなし＝診断なので視聴者が自分で選ぶ）
#   diagStep      : 進行ドット（1〜3）
#   diagResult    : 結果カードのタイプ名（"もくもく職人タイプ"）※紙吹雪演出つき
#   diagResultSub : 結果カード上の条件ラベル（"全部Aのあなた"）
#   diagResultTag : 結果カード下の天職チップ（"天職：建築・土地づくり"）
#   diagBait      : 下部のコメント誘発リボン
#
# 情報ソース: docs/yomogi/living 配下（土地保護/農業/釣り/チェストショップ/会社/参加費無料/統合版）
# 素材: public/content 配下、BGM: 甘茶の音楽工房「ピコピコディスコ」（フリー・商用可）


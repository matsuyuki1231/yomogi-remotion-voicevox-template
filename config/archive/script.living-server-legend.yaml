# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 都市伝説検証型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「都市伝説検証型」フェイクアウト・ドキュメンタリー
#   マイクラ系ショートで実績のある「都市伝説・検証系」の釣りジャンルに寄せた新設計。
#   前半は「マイクラに"第二の人生が始まる世界"があるというウワサ」を検証する体で
#   都市伝説動画として釣り、目撃情報（＝サーバーの実映像）を集めるたびに
#   信憑性ゲージが上昇。「実在確認」スタンプを連打して、後半で正体＝よもぎ生活サーバーを
#   リビールし「参加費0円」→ 検索CTA → コメント誘発で着地する。
#   ずんだもん＝検証役、めたん＝懐疑役（視聴者代弁で疑い、途中で寝返る）。
#
# ■ 新フィールド（LegendOverlay 用）:
#   legendFile     : 左上のファイルバッジ（"FILE No.013"）
#   legendRumor    : 上部のウワサ見出し（明朝体・ドキュメンタリー風）
#   legendCred     : ウワサ信憑性ゲージ（0〜100、100でゴールド化＝リビール）
#   legendEvidence : 目撃情報タグ（"目撃情報①" など、危険テープ風）
#   legendStamp    : 中央に叩き込む検証スタンプ（"実在確認" / "全部実話" / "参加費0円"）
#   legendStampSub : スタンプ上の小ラベル（"目撃情報①" / "検証結果"）
#   legendBait     : 下部のコメント誘発リボン
#
# 情報ソース: docs/yomogi/living 配下（車/チェストショップ/会社/農業/釣り/参加費無料/統合版）
# 素材: public/content 配下、BGM: 甘茶の音楽工房「テクノフォビア」（フリー・商用可）


# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 参加型・○✕クイズ型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「参加型・○✕クイズ型」インタラクティブ・ショート
#   2026年のバズるショート傾向（コメント誘発の設計 / 二択タップ参加 / 直接視聴者へ問いかけ /
#   代弁者がわざと外して「いや違うw」を誘発 / 冒頭3秒フック / 完走率重視）に合わせて設計。
#   ずんだもんが「マイクラでここまでできる？」を出題し、視聴者に○/×で当てさせる。
#   めたんは視聴者代弁の“外し役”。正解リビールで「できる！」を叩き込み、連続正解カウンターが伸びる。
#   最終問題「遊ぶのにお金は必要？」→「参加は無料」でCTAへ着地。
#
# ■ 新フィールド（QuizOverlay 用）:
#   quizNo      : 上部の問題番号バッジ（"Q1"/"最終問題" など）
#   quizQ       : 大きな設問（CTA行では見出しとして使用）
#   choiceA     : 選択肢A（"○ できる" など）
#   choiceB     : 選択肢B（"× ムリ" など）
#   answer      : リビール時の正解（"A" / "B"）→ 正解チップが緑に光る
#   verdict     : 中央に叩き込む判定スタンプ（"できる！"）
#   verdictSub  : 判定スタンプ上の小ラベル（"正解"）
#   score       : 右上の「連続できる」カウンター（1→4）
#   commentBait : 下部のコメント誘発リボン
#   ※ 設問行→（めたんの外し）→リビール行 の2〜3行で1問。設問文脈は各行に引き継ぐ
#
# 情報ソース: docs/yomogi/living 配下（車/チェストショップ/会社/バフ/参加は無料 等）
# 素材: public/content/生活サーバー 配下


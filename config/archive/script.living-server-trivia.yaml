# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 雑学連発型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「雑学5連発」型（最後の1本だけが宣伝）
#   「知ってると得する雑学5選」の顔で始め、その1〜その4は生活サーバーと
#   まったく無関係な雑学を畳みかける。視聴者はリストの完走目的で残るので、
#   宣伝が来る頃には離脱ポイントを通り過ぎている。
#
#   その5で「今のマイクラは会社を作って社長になれる」という“雑学の顔をした宣伝”に着地。
#   めたんに「それ雑学じゃなくて宣伝じゃない？」とツッコませ、ずんだもんが
#   「バレたのだ」と認めることで、隠すのではなくネタとして成立させている。
#
#   雑学ごとにアクセント色が変わる（黄→水→橙→桃→緑）ので、
#   映像素材のない前半でも画面が単調にならない。
#
# ■ 新フィールド（TriviaCard 用）:
#   triviaNo        : 上部の番号バッジ（"その1"）
#   trivia          : 中央の問い（蛍光ペン下線つきの大見出し）
#   triviaEmoji     : 円の中に置く絵文字アイコン
#   triviaAnswer    : 白い答えカードの本文
#   triviaAnswerSub : 答えカードの補足行
#   triviaSource    : 下部の出典ラベル
#   triviaStep      : 進行ドットと画面のアクセント色（1〜5）
#   triviaFinal     : 番号バッジを「最後の雑学」表記にする
#   triviaCta       : 検索バー風CTA
#   triviaBait      : コメント誘発リボン
#
# 前半の画面は外部画像を使わず TriviaCard.tsx がCSSと絵文字で描画している。
# 映像素材（public/content）を使うのは、その5の宣伝パートだけ。
#
# 情報ソース（宣伝パート）: docs/yomogi 配下
# 素材: public/content 配下


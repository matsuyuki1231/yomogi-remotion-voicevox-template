# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / ギャップ実証型フォーマット）
# セリフを編集後、npm run sync-script で反映
#
# ■ フォーマット: 「え、これ全部マイクラ？」ギャップ実証型ショート
#   バズるショートの王道「パターンインタラプト → 常識破壊の連打 → 反論処理 → CTAループ」で構成。
#   冒頭で正体を隠して意表を突き、生活サーバーの神機能を「できることカウンター」で畳みかける。
#
# ■ 新フィールド（ImpactOverlay 用）:
#   stamp    : 画面中央に叩き込むデカ文字スタンプ（スラムイン＋揺れ＋白フラッシュ）
#   stampSub : スタンプ上の小ラベル（省略可）
#   combo    : 「できること」カウンター（右上・数字）。1→6 で escalation
#   chip     : 画面左上のカテゴリチップ（省略可）
#
# 情報ソース: docs/yomogi/living 配下（会社/土地保護/バフ/チェストショップ 等）
# 素材: public/content/生活サーバー 配下


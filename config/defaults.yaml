# デフォルト値設定

newLine:
  character: tsumugi
  pauseAfter: 15
  durationInFrames: 60
  scene: 1
  emotion: null

automation:
  # 保存時に音声を自動生成（VOICEVOXが起動している場合）
  voiceOnSave: false
  # voiceFileを自動命名（{id}_{character}.wav）
  autoVoiceFileName: true

bgm:
  src: "Midnight_party.mp3"
  volume: 0.16
  loop: true

# デフォルト値設定

newLine:
  character: tsumugi
  pauseAfter: 15
  durationInFrames: 60
  scene: 1
  emotion: null

automation:
  # 保存時に音声を自動生成（VOICEVOXが起動している場合）
  voiceOnSave: false
  # voiceFileを自動命名（{id}_{character}.wav）
  autoVoiceFileName: true

bgm:
  # 甘茶の音楽工房（フリーBGM・商用可・クレジット任意・コンテンツID登録不可）
  # segments を指定した場合はそちらが優先される（src は未指定時のフォールバック）
  src: "amacha_sanjinooyatsu.mp3"
  volume: 0.16
  loop: true
  # 雑学連発型: 雑学パートは軽快でコミカルな曲、
  # 最後の宣伝パート（その5）でおしゃれめの曲に切り替えて空気を変える
  segments:
    # 「3時のおやつ」— コミカルで軽い
    - src: "amacha_sanjinooyatsu.mp3"
      volume: 0.16
      loop: true
      fromLineId: 1
    # 「マーブルテクノI」— おしゃれで軽快なテクノ
    - src: "amacha_marbletechno1.mp3"
      volume: 0.17
      loop: true
      fromLineId: 19

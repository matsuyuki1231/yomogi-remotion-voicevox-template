# デフォルト値設定

newLine:
  character: tsumugi
  pauseAfter: 15
  durationInFrames: 60
  scene: 1
  emotion: null

automation:
  # 保存時に音声を自動生成（VOICEVOXが起動している場合）
  voiceOnSave: false
  # voiceFileを自動命名（{id}_{character}.wav）
  autoVoiceFileName: true

bgm:
  # 甘茶の音楽工房「ピコピコディスコ」（フリーBGM・商用可・クレジット任意）
  # segments を指定した場合はそちらが優先される（src は未指定時のフォールバック）
  src: "amacha_picopicodisco.mp3"
  volume: 0.15
  loop: true
  # チャットストーリー型: 前半のミステリーは不穏な曲、リビール以降は明るい曲に切り替える
  segments:
    - src: "BGM_-_135_-_Melancholic_New_York.mp3"
      volume: 0.13
      loop: true
      fromLineId: 1
    - src: "amacha_picopicodisco.mp3"
      volume: 0.15
      loop: true
      fromLineId: 14

# デフォルト値設定

newLine:
  character: tsumugi
  pauseAfter: 15
  durationInFrames: 60
  scene: 1
  emotion: null

automation:
  # 保存時に音声を自動生成（VOICEVOXが起動している場合）
  voiceOnSave: false
  # voiceFileを自動命名（{id}_{character}.wav）
  autoVoiceFileName: true

bgm:
  # フリーBGM（商用可・クレジット任意・コンテンツID登録不可）
  # segments を指定した場合はそちらが優先される（src は未指定時のフォールバック）
  src: "retrogamecenter.mp3"
  volume: 0.16
  loop: true
  # 究極の2択（VS）型:
  # 二択パートはゲームセンター風、リビール（id:19）でテクノに切り替えて空気を変える
  segments:
    # 「レトロゲームセンター」— 対戦画面の空気に合う。二択の連打と相性がいい
    - src: "retrogamecenter.mp3"
      volume: 0.16
      loop: true
      fromLineId: 1
    # 「マーブルテクノI」— おしゃれで軽快。宣伝パートの空気に切り替える
    - src: "amacha_marbletechno1.mp3"
      volume: 0.18
      loop: true
      fromLineId: 19

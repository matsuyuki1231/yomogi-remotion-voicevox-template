# デフォルト値設定

newLine:
  character: tsumugi
  pauseAfter: 15
  durationInFrames: 60
  scene: 1
  emotion: null

automation:
  # 保存時に音声を自動生成（VOICEVOXが起動している場合）
  voiceOnSave: false
  # voiceFileを自動命名（{id}_{character}.wav）
  autoVoiceFileName: true

bgm:
  # フリーBGM（商用可・クレジット任意・コンテンツID登録不可）
  # segments を指定した場合はそちらが優先される（src は未指定時のフォールバック）
  src: "amacha_picopicodisco.mp3"
  volume: 0.16
  loop: true
  # 偽ライブ配信・バズ中継型:
  # 沸くパートは速い曲、リビール（id:11）で切り替えて空気を変える
  segments:
    # 「ピコピコディスコ」— 軽快でコミカル。深夜バズ配信の高揚と相性がいい
    - src: "amacha_picopicodisco.mp3"
      volume: 0.16
      loop: true
      fromLineId: 1
    # 「シンプルスタイル」— 明るく爽やか。リビール〜宣伝パートの空気に切り替える
    - src: "amacha_simplestyle.mp3"
      volume: 0.18
      loop: true
      fromLineId: 11

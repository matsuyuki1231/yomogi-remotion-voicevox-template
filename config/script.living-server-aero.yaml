# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / Frutiger Aero型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「Frutiger Aero型」ノスタルジー・フェイクアウト
#   2000年代後半のツヤツヤUI（Windows Vista / iOS 6 / Wii あたり）を再現した
#   “偽のOS画面”から始まる。前半は宣伝色ゼロの懐かしネタ＋豆知識で、
#   「Frutiger Aero」というデザイン名を教えて共有・コメントの動機を作る。
#
#   前半（id1〜15）: 起動画面 → デスクトップ → 「これ名前あるのだ」→ 豆知識 →
#                    「今のアプリは全部フラット」でツヤが消える演出（aeroFlat）→ 喪失感。
#   後半（id16〜）: 「まだ残ってる場所がある」でリビール（aeroFlare）。
#                   ウィンドウの中に生活サーバーが映り、枠を出て全画面で畳みかける。
#   ラストは前半の「キラキラした世界」を回収し、検索CTA＋懐かしコメント誘発で締める。
#
#   ※ めたんに「全然エアロじゃないわよ」と一度ツッコませ、こじつけを自覚した上で
#     「作りかけの街が毎日ふえる」という中身で反転させる構成にしている。
#
# ■ 新フィールド（AeroOS 用）:
#   aeroBoot     : 起動スプラッシュの大文字ロゴ
#   aeroBootSub  : 起動スプラッシュの小文字
#   aeroDesktop  : ツヤツヤアイコン＋ドックのデスクトップを表示
#   aeroWindow   : ウィンドウ枠のタイトル（visual がこの枠の中に嵌まる）
#   aeroBadge    : 左上のグロッシーなカテゴリピル
#   aeroSub      : 見出し上の小ラベル
#   aeroHeadline : 中央の光沢見出し
#   aeroTip      : 下部の情報バー（豆知識）
#   aeroCounter  : 右上の「できること」カウンターオーブ
#   aeroFlat     : ツヤと彩度を奪ってフラットUI化
#   aeroFlare    : リビールの光と泡の弾け
#   aeroCta      : 検索バー風CTA（文字がタイプされる）
#   aeroBait     : 下部のコメント誘発リボン
#
# 前半は外部画像を一切使わず、壁紙・アイコン・泡をすべてCSSで描画している（AeroOS.tsx）。
# BGMは config/defaults.yaml の segments で前半（幻想・水）と後半（明るいテクノ）を切り替え。
#
# 情報ソース: docs/yomogi 配下（統合版/参加費無料/土地購入・建築/会社制度/車/釣り275種/
#             チェストショップ/ガチャ/島/近距離VC）
# 素材: public/content 配下


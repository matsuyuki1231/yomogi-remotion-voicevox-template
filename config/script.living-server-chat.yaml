# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / チャットストーリー型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「チャットストーリー型」フェイクアウト・ミステリー
#   TikTok/Shortsで最も強いジャンルのひとつ「fake text story（トーク画面ストーリー）」に擬態する設計。
#   0秒目からイントロなしで“他人のスマホのトーク画面”が始まるので、スワイプされる前に物語が動き出す。
#
#   前半（id1〜13）は宣伝色ゼロの人間ドラマ：
#     「3週間ログインしてこない友達」に既読すらつかない → 突然「入力中…」→ 返信 →
#     「どこにいたの？」の引っぱり → 送られてきた1枚のスクショでリビール。
#   後半（id14〜）はチャットUIを吹き飛ばして全画面映像に切り替え、生活サーバーの中身を畳みかける。
#   ラストは冒頭の「3週間帰ってこない」を回収し、「キミの友達も来なくなってない？」で
#   視聴者自身の話にすり替えてコメントを誘発する。
#
# ■ 新フィールド（ChatOverlay 用）:
#   chatTitle   : トーク相手の名前（一度書けば以降のセリフに引き継がれる）
#   chatSub     : ヘッダーの状態表示（"最終ログイン 21日前"）
#   chatFrom    : me（右・青）/ them（左・グレー）
#   chatMsg     : 吹き出し本文。指定した行は字幕を出さず、吹き出しが字幕を兼ねる
#   chatImg     : 吹き出しに貼る画像（public/content 配下）
#   chatTime    : 吹き出し脇のタイムスタンプ
#   chatDivider : 直前に挟む赤い未読区切り線
#   chatTyping  : 相手が入力中（… の吹き出し）
#   chatRead    : 自分の最新吹き出しの下に出す "未読" / "既読" ラベル
#   chatBreak   : この行でチャットUIを拡大・消滅させ、全画面映像へ移行する
#
# 後半は既存の ImpactOverlay（stamp / combo / chip / bait）を流用。
# BGMは config/defaults.yaml の segments で前半（不穏）と後半（明るい）を切り替えている。
#
# 情報ソース: docs/yomogi 配下（統合版/参加費無料/土地購入・建築/会社制度/車/釣り275種/
#             チェストショップ/ガチャ/島/近距離VC）
# 素材: public/content 配下


# スクリプトデータ（よもぎマイクラ人狼 宣伝ショート / 雑学連発型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「雑学5連発」型（最後の1本だけが宣伝）
#   生活サーバー版と同じ TriviaCard を使うが、雑学の中身を差し替えている。
#
#   その1〜その4は「だます側」と「見抜く側」の雑学で統一してある：
#     托卵（他人の巣にまぎれこむ）／擬態（別のものになりすます）／
#     人は嘘を54%しか見抜けない／「ウソ」という名前の鳥。
#   宣伝と無関係な雑学として単体で成立しつつ、そのまま人狼の前ふりになっている。
#
#   その5で「毎週土曜の夜、マイクラで人狼ができる」に着地。
#   めたんの「これ、嘘を見抜けないと負けるやつじゃない」で
#   その3の雑学を回収し、ずんだもんが「ぜんぶ前ふりなのだ」と明かす。
#
# ■ 情報ソース: docs/yomogi/wolf 配下
#   - 毎週土曜21:30から定期開催（event-administer.md）
#   - 統合版マイクラを持っていれば誰でも無料（event-administer.md）
#   - 役職は2026年7月19日時点で47種類（supplement/all_roles.md）
#   - 近距離VC：ゲーム中は近くの人としか会話できない（faq/unreachable-lvc.md）
#   - サボタージュ：人狼陣営が発動し、制限時間内に解除できないと市民陣営が敗北（sabotage.md）
#   - 開始時にルール説明があるので、21:30から参加するならルール未学習でも可（how-to-join/index.md）
#
# 素材: public/content/マイクラ人狼 配下（mp4の4本を startFrom を変えて使い分けている）


# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / お会計・査定型）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「お会計・査定」型（値段当て系フェイクアウト＋0円落とし）
#   マイクラ映像に映る「暮らし」を現実のお金に換算して査定していく。
#   画面上部のレジ風メーターが1項目ごとにチャリンと加算されて回り続け、
#   車→土地→家→店→社長→釣り三昧と積み上がって総額5,785万円に到達。
#   直後に「それが、ぜんぶタダ」で総額を0円に叩き落とすのがオチ。
#
#   「これ、いくらだと思う？」の値段当ては視聴者が頭の中で参加してしまう
#   鉄板ジャンルで、コメント欄への査定額書き込みも自然に誘発できる。
#   前半20秒はサーバー名を一切出さない。宣伝が来る頃には離脱ポイントを通り過ぎている。
#
#   締めの「いくらだと思った？」が冒頭の「いくらだと思う？」に戻るのでループする。
#   （2025年3月末からループ再生も再生回数に加算されるため、末尾は必ず冒頭に接続する。
#     最後の行の映像は1行目とまったく同じ src / startFrom にしてある）
#
# ■ 構造上のルール
#   - 査定項目の行 = priceItem（デカ文字）+ priceTag（値札）+ priceAdd（円）。
#     メーターはカット頭14フレームで回りきる。項目のセリフは体言止めの1フレーズ
#   - priceAdd の合計と priceTotal / priceZeroStrike の数字は必ず一致させること
#     （現在: 250万+1,500万+3,000万+1,000万+25万+10万 = 5,785万円 = ¥57,850,000）
#   - 現実換算の金額はあくまで「ざっくり査定」のギャグ。サーバー側の事実
#     （何ができるか）だけを docs/yomogi で裏を取る
#
# ■ 情報ソース: docs/yomogi 配下
#   - 参加費無料・統合版のみ・24時間あそべる生活/経済サーバー（intro.md）
#   - 生活ワールドに土地を購入して自分だけの家や店を建てられる（intro.md, commands/land-protection.md）
#   - チェストショップは保護した土地の中に無料で設置できる（commands/chest-shop.md）
#   - 会社は無料で設立できるが審査あり（commands/company.md）
#   - 釣りで釣れる魚は275種類（intro.md）
#   - 車に乗って生活ワールドを駆け回れる（intro.md）
#
# 素材: public/content/生活サーバー 配下
# 効果音: item-get1 / drum-roll1 / amount-display1 / jajean1 は効果音ラボ
# （商用可・クレジット不要 https://soundeffect-lab.info/）


# スクリプトデータ（マイクラ人狼 宣伝ショート / ギャップ実証型フォーマット）
# セリフを編集後、npm run sync-script で反映
#
# ■ フォーマット: 生活サーバー版と同じ「ImpactOverlay」型（stamp/combo/chip）を人狼に適用。
#   フック → ヤバい能力の連打（カウンター 1→6）→ 反論処理（難しそう？）→ CTAループ。
#   ※旧ランキング型（No.6→No.1）とは別物。中央スタンプのスラムイン＋カウンター演出で畳みかける。
#
# ■ 新フィールド（ImpactOverlay 用）:
#   stamp    : 画面中央に叩き込むデカ文字スタンプ
#   stampSub : スタンプ上の小ラベル（省略可）
#   combo    : 「できること」カウンター（右上・数字）。1→6 で escalation
#   chip     : 画面左上のカテゴリチップ（ここでは役職名）
#
# 情報ソース: docs/yomogi/wolf 配下（毎週土曜21:30開催・統合版・参加費無料・全41役職）
# 素材: public/content/マイクラ人狼 配下


# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 移住ストーリー型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「移住ストーリー型」ナラティブ・ショート
#   2026年のバズるショート傾向（ストーリー主導 / Hook→Problem→Solution→CTA / 開いたループ /
#   14〜15秒地点の二次フック / 無音前提の字幕）に合わせて設計。
#   ずんだもんが「生活サーバーに休日を“乗っ取られた”移住体験」を語り、めたんが聞き役。
#   DAYカウンターが 1→今 へ進むほど沼にハマる感情のアーク。冒頭の伏線を最後に回収してCTAループ。
#
# ■ 新フィールド（StoryOverlay 用）:
#   day       : 左上のDAYバッジ（"1"/"3"/"7"/"14"/"30"/"今"）。経過プログレスバーが伸びる
#   phrase    : 画面中央のエモ・パンチライン（ナレーションの一言・引用風）
#   phraseSub : パンチライン上の小ラベル（省略可）
#   ※ day/phrase の無い行（めたんの相槌）は字幕のみ＝会話のテンポを作る
#
# 情報ソース: docs/yomogi/living 配下（土地保護/チェストショップ/会社/バフ/釣り/農業 等）
# 素材: public/content/生活サーバー 配下


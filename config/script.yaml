# スクリプトデータ（マイクラ人狼 宣伝ショート / タイプ診断型フォーマット）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「タイプ診断型」心理テスト風フェイクアウト・ショート（人狼版）
#   生活サーバー版（config/script.living-server-diagnosis.yaml）と同一フォーマット。
#   前半は宣伝色ゼロの「人狼適性診断」3問（ウソを見抜ける？/つける？/ピンチの切り抜け方）で
#   視聴者を巻き込み、結果4タイプを実在の役職（化けの狼/占い師/騎士/殺人鬼）に対応させて発表。
#   めたんの「その適性、どこで試すの？」から「毎週土曜よる9時半・よもぎサーバーの
#   マイクラ人狼・役職47種類」をリビールし、無料→検索CTA→コメント誘発で締める。
#
# 情報ソース: docs/yomogi/intro.md、docs/yomogi/wolf 配下
#   （毎週土曜21:30開催/統合版/参加無料/初心者サポート/役職47種類=supplement/all_roles.md）
# 素材: public/content/マイクラ人狼 配下、BGM: 甘茶の音楽工房「ピコピコディスコ」（フリー・商用可）


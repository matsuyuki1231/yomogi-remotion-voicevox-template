# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 究極の2択・VS型）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「究極の2択」型（フェイクアウト＋崩壊オチ）
#   画面を斜めに上下2分割し、上下それぞれに実映像を敷いて「A か B か」を突きつける。
#   めたんが問い、ずんだもんが即答し、選ばれた側が全画面に開く——を1問1.5秒で畳みかける。
#
#   Q1・Q2 は普通のマイクラの二択（建築／探検、畑／釣り）でマイクラ視聴者を釣る。
#   Q3「歩きか、車か」で最初の「え？」を作り、Q4以降は答えが「どっちも」に崩れていく。
#   二択が成立しなくなった理由が「よもぎサーバーの生活サーバーだから」というのがオチ。
#
#   前半18秒はサーバー名を一切出さない。宣伝が来る頃には離脱ポイントを通り過ぎている。
#
#   締めの「で、あなたはどっち？」が冒頭の「究極の二択」に戻るのでループする。
#   （2025年3月末からループ再生も再生回数に加算されるため、末尾は必ず冒頭に接続する。
#     最後の行の映像は1行目とまったく同じ src / startFrom にしてある）
#
# ■ 構造上のルール
#   - 「問い」の行 = duelA + duelB（duelPick なし）。ここで Q番号が1つ進む
#   - 「決着」の行 = duelA + duelB + duelPick。番号は据え置き、スタンプを出す
#     · duelPick: a / b → その側の映像を全画面に開く（visual は type: video）
#     · duelPick: both  → 分割のまま両パネルを光らせる（visual は type: split のまま）
#   - 決着の補足（duelPickSub）は docs/yomogi で裏を取った事実だけを書く
#
# ■ 情報ソース: docs/yomogi 配下
#   - 参加費無料・統合版のみ・24時間あそべる生活/経済サーバー（intro.md）
#   - 生活ワールドに土地を購入して自分だけの家や店を建てられる（intro.md, commands/land-protection.md）
#   - チェストショップは保護した土地の中に無料で設置できる（commands/chest-shop.md）
#   - 釣れる魚は275種類（intro.md）
#   - 車に乗って生活ワールドを駆け回れる（intro.md）
#   - 役職は木こり・採掘者・農家・エンチャンター。/roleで無料・何度でも変更可（commands/role.md）
#   - 会社は無料で設立できるが審査あり。社長は1人だけ（commands/company.md）
#
# 素材: public/content/生活サーバー 配下


# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 3択・制限時間クイズ型）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「3択・制限時間クイズ」型（視聴者参加型フェイクアウト）
#   「このゲーム、何問わかる？」と参加を促し、3択＋カウントダウンリング（3→2→1）で
#   視聴者に答えさせる。正解が積み上がるほど生活サーバーの機能が明かされ
#   （マイクラ→自分の土地→自分の店→参加費0円）、最終問題のあと「よもぎサーバーの
#   生活サーバー」と正体を明かす。締めは「何問正解した？コメントで」でループ＆コメント誘発。
#
#   前半（Q1〜Q3）はサーバー名を出さず「この街／この家／この店は何？」の当てものとして
#   釣る。Q1で「正解はマイクラ」のギャップを一発置き、以降で暮らしの機能を積む。
#
# ■ 視聴維持・参加の装置
#   1. カウントダウンリング（CountdownRing）… 出題ごとに時間が減る＝視聴者が答える強制力
#   2. 3択カードの点灯リビール（ChoiceList）… 1問1カットで切り替わり正解が緑に光る
#   3. スコアカウンター（ScoreBadge）… 「ここまで◯問」で達成感、締めで自分の点数を問う
#
# ■ 構造上のルール（1問＝出題行＋解答行の2行構成）
#   - 出題行: quizNo / quizQ / quizChoices / quizAnswer / quizTimer:true（リングが回る）
#   - 解答行: quizNo / quizQ / quizChoices / quizAnswer / quizAnswerReveal:true（正解が光る＋スコア加算）
#   - quizChoices は出題行・解答行の両方に同じ内容を書く（カードを2カットにわたって見せるため）
#   - quizAnswer の正解位置はなるべく散らす（毎回同じ位置だと当てずっぽうで当たる）
#   - サーバー側の事実（無料・24時間・土地/家/店/会社/釣り/車）だけを docs/yomogi で裏取り
#   - BGMの切替（fromLineId）はリビール行（id10）に合わせる
#
# ■ 情報ソース: docs/yomogi 配下
#   - 参加費無料・統合版のみ・24時間あそべる生活/経済サーバー（intro.md）
#   - 生活ワールドに土地を購入して自分だけの家や店を建てられる（intro.md）
#   - チェストショップで自分のアイテムを販売できる（intro.md）
#   - 車に乗って生活ワールドを駆け回れる（intro.md）
#
# 素材: public/content/生活サーバー 配下
# 効果音: drum-roll1 / item-get1 / jajean1 / boom は効果音ラボ等（商用可・クレジット不要）


# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / 偽ライブ配信・バズ中継型）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「偽ライブ配信・バズ中継」型（今バズってる深夜配信を装うフェイクアウト）
#   マイクラ実映像の上に「ライブ配信のUI」を丸ごと被せる。冒頭「同接17万人の配信、何これ？」で
#   釣り、暮らし（家・土地・店・車・社長・釣り）が次々映るたびにコメントが沸き、同時接続カウンターが
#   伸び続ける。「これ何の配信？」→「マイクラなのだ」でコメント爆発、そこで初めて
#   「よもぎサーバーの生活サーバー」と明かす。オチは同接の正体回収＝
#   「これ"配信"じゃない。全員が自分でプレイしてる人たち」。参加費0円で締める。
#
#   前半（id1〜id9）はサーバー名もマイクラも一切出さない。一般のショート視聴者を
#   「新作ゲーム？メタバース？」と釣り、宣伝が来る頃には離脱ポイントを通り過ぎている。
#
#   締めの「同接、何人だと思った？」が冒頭の「同接17万人」に戻るのでループする。
#   （末尾 id16 の映像は id1 とまったく同じ src / startFrom にしてある）
#
# ■ 視聴維持の装置（余白を作らせない3点セット）
#   1. 同接カウンター（LiveBar）… liveViewers を持つ行の間だけ出て、カット頭14フレームで回る。
#      数字が伸びる快感＋社会的証明。リビール（id11）で値を持つ行が切れてカウンターが消える
#   2. 流れるコメント（LiveCommentLayer）… 各行の comments を行頭からずらして投入。
#      行境界をまたいで下から上へ流れ続けるので画面が常に動く。視聴者の疑問を先回りで代弁する
#   3. スーパーチャット（superChat）… 1カット1回、右から飛び込んでテンポを刻む
#
# ■ 構造上のルール
#   - 前半 id1〜id9 でサーバー名・マイクラを出さない（フェイクアウトの生命線）
#   - id6 のコメントに「え、マイクラ？」の伏線を1つだけ置く（id10 の爆発の前フリ）
#   - 同接の数字は「配信の演出」というギャグ装置。id13 で「実は配信じゃない」と正体を回収する。
#     サーバー側の事実（無料・24時間・土地/家/店/会社/釣り/車）だけを docs/yomogi で裏取り
#   - BGMは id1 から速い曲、リビール（id11）で切り替えて空気を変える（defaults.yaml）
#
# ■ 情報ソース: docs/yomogi 配下
#   - 参加費無料・統合版のみ・24時間あそべる生活/経済サーバー（intro.md）
#   - 生活ワールドに土地を購入して自分だけの家や店を建てられる（intro.md）
#   - チェストショップで自分のアイテムを販売できる（intro.md）
#   - 会社制度で会社経営が楽しめる（intro.md）
#   - 釣りで釣れる魚は275種類（intro.md）
#   - 車に乗って生活ワールドを駆け回れる（intro.md）
#
# 素材: public/content/生活サーバー 配下
# 効果音: item-get1 / drum-roll1 / amount-display1 / roll-finish1 / jajean1 / boom は効果音ラボ等
# （商用可・クレジット不要 https://soundeffect-lab.info/）


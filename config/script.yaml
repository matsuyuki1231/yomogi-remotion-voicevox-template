# スクリプトデータ（よもぎ生活サーバー 宣伝ショート / カウントアップ・チャレンジ型）
# セリフを編集後、npm run sync-script → npm run voices の順で反映
#
# ■ フォーマット: 「20秒で何個言える？」型
#   冒頭で「マイクラでできること、20秒で何個言える？」と投げ、
#   カウントダウンタイマーを走らせながら、できることを約1秒1個で20連発する。
#   数え終わってから初めて「ぜんぶ よもぎサーバーの生活サーバー」と明かす。
#
#   前半18秒はサーバー名を一切出さない。一般のマイクラ視聴者への釣りとして機能し、
#   宣伝が来る頃には離脱ポイントを通り過ぎている。
#
#   「20秒チャレンジ」で「20個」出るように項目数を合わせてある。
#   項目を増減したら runResult の数字も必ず合わせること（数が合わないと嘘になる）。
#
#   締めの「あなたは何個言えた？」が冒頭の「何個言える？」に戻るのでループする。
#   （2025年3月末からループ再生も再生回数に加算されるため、末尾は必ず冒頭に接続する。
#     最後の行の映像は1行目とまったく同じ src / startFrom にしてある）
#
# ■ 情報ソース: docs/yomogi 配下
#   - 参加費無料・統合版のみ・24時間あそべる生活/経済サーバー（intro.md）
#   - 土地保護で土地を購入し、家や店を建てられる（commands/land-protection.md）
#   - チェスト保護でチェストを守れる（commands/chest-protection.md）
#   - チェストショップで自分のアイテムを販売できる（intro.md, commands/chest-shop.md）
#   - 釣れる魚は275種類（intro.md）
#   - 役職は木こり・採掘者・農家・エンチャンター。変更は無料で何度でも（commands/role.md）
#   - /buffで暗視や採掘速度上昇を秒単位でレンタルできる（commands/buff.md）
#   - ガチャ、称号（5000YGで自作）、車（commands/gacha.md, rank.md, intro.md）
#   - 会社プラグイン: 社長/課長/社員、設立無料（審査あり）、銀行と帳簿（commands/company.md）
#
# 素材: public/content/生活サーバー 配下（1項目1カットで割り当て）

